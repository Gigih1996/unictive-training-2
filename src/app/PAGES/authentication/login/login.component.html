<div class="flex items-center justify-center min-h-screen bg-gray-100">
  <div class="bg-white shadow-lg rounded-lg p-8 w-full max-w-md">
    <h2 class="text-2xl font-bold mb-6 text-center">Login</h2>
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="mb-4">
        <!-- <label class="block text-gray-700 mb-2" for="phone">Phone</label> -->
        <input-text formControlName="phone" [label]="'Phone'" [control]="form.get('phone')"></input-text>
      </div>
      <div class="mb-6">
        <!-- <label class="block text-gray-700 mb-2" for="password">Password</label> -->
        <input-text formControlName="password" [type]="'password'" [label]="'Password'" [control]="form.get('password')"></input-text>
      </div>
      <button type="submit" [disabled]="loading"
        class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition-colors disabled:opacity-50">
        {{ loading ? 'Logging in...' : 'Login' }}
      </button>
    </form>
  </div>
</div>
